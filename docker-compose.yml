version: '3.8'

services:
  fam-bam-dash:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time — required for Google OAuth
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        # Optional build-time defaults (can be configured via the UI after first run)
        - VITE_GCAL_CALENDAR_ID=${VITE_GCAL_CALENDAR_ID:-}
        - VITE_TIMEZONE=${VITE_TIMEZONE:-America/New_York}
    container_name: fam-bam-dash
    ports:
      - "12000:12000"
    restart: unless-stopped
    environment:
      # Runtime secrets — used by server-side plugins only, never sent to the browser
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GCAL_ICAL_URL=${GCAL_ICAL_URL:-}
      - TZ=${VITE_TIMEZONE:-America/New_York}
    volumes:
      # Persist todos, settings, and uploaded photos across container restarts
      - fam-bam-data:/app/data
      - fam-bam-photos:/app/public/uploads

volumes:
  fam-bam-data:
  fam-bam-photos:
